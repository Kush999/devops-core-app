name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    code-quality:
        name: Lint and Test Application
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Set up Python
          uses: actions/setup-python@v2
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: |
                python -m pip install --upgrade pip
                pip install flake8
                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
        
        - name: Lint code with flake8
          run: |
                # Stop the build if there are Python syntax errors or undefined names
                flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    build-and-ship-image:
      name: Compile & Push to Amazon ECR
      needs: code-quality
      runs-on: ubuntu-latest
    
    # Required permissions to allow GitHub to request the secure OIDC token from AWS
      permissions:
        id-token: write
        contents: read

      steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 1: Securely authenticate into AWS using OIDC token exchanging
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # PASTE YOUR OUTPUTTED ROLE ARN STRING RIGHT HERE:
          role-to-assume: arn:aws:iam::887401460193:role/github-actions-deployment-role
          aws-region: us-east-1

      # Step 2: Log directly into your private ECR engine warehouse
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 3: Build your Dockerfile layers and push them straight to the AWS cloud!
      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: devops-core-app
          IMAGE_TAG: latest
        run: |
          # Build the Docker image locally on the runner machine
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          # Ship the image layers up to your secure AWS repository
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG